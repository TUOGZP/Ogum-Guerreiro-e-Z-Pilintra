<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12131c">
<title>Hinário Digital da Gira</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg:#111018; --panel:#171923; --card:#20202c; --text:#fff8ea; --muted:#c7bda9;
  --gold:#d7b56d; --line:#3a3345; --accent:#7b5fa4; --shadow:0 18px 40px rgba(0,0,0,.28);
  --font: 20px;
}
body.light {
  --bg:#f8f1e8; --panel:#fffaf2; --card:#ffffff; --text:#211a17; --muted:#6b5e52;
  --gold:#8b6832; --line:#e1d4c5; --accent:#6a4c8a; --shadow:0 16px 32px rgba(88,67,45,.16);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0; background: radial-gradient(circle at top,#2a2235 0%,var(--bg) 42%,#0d0d12 100%);
  color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
}
body.light { background: radial-gradient(circle at top,#fff8ed 0%,var(--bg) 70%); }
header {
  min-height:86vh; display:grid; place-items:center; padding:32px 18px;
  background:
    linear-gradient(rgba(17,16,24,.55),rgba(17,16,24,.92)),
    radial-gradient(circle at 25% 20%, rgba(215,181,109,.28), transparent 25%),
    radial-gradient(circle at 75% 30%, rgba(123,95,164,.35), transparent 25%);
}
.hero { max-width:820px; text-align:center; }
.mark {
  width:96px; height:96px; border:1px solid var(--gold); border-radius:28px; display:grid; place-items:center;
  margin:0 auto 22px; background:rgba(255,255,255,.05); box-shadow:var(--shadow); font-size:46px;
}
h1 { margin:0; font-family: Georgia, serif; font-size:clamp(42px, 8vw, 78px); color:#fff3d6; line-height:1; }
body.light h1 { color:#3c2b1e; }
.hero p { color:var(--muted); font-size:20px; line-height:1.5; }
.actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:26px; }
button, a.btn {
  border:1px solid var(--line); background:var(--card); color:var(--text); padding:12px 16px;
  border-radius:16px; font-weight:700; cursor:pointer; text-decoration:none;
}
.primary { background:linear-gradient(135deg,#7b5fa4,#d7b56d); color:white; border:0; }
.toolbar {
  position:sticky; top:0; z-index:50; background:rgba(18,19,28,.88); backdrop-filter: blur(14px);
  border-bottom:1px solid var(--line); padding:10px; display:grid; gap:10px;
}
body.light .toolbar { background:rgba(255,250,242,.9); }
.searchrow { display:flex; gap:8px; }
input {
  width:100%; border:1px solid var(--line); border-radius:15px; padding:13px 14px; font-size:17px;
  background:var(--panel); color:var(--text);
}
.chips { display:flex; gap:9px; overflow:auto; padding-bottom:5px; scrollbar-width:thin; }
.chip { white-space:nowrap; padding:10px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--text); text-decoration:none; }
main { max-width:980px; margin:0 auto; padding:24px 14px 120px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin:22px 0 30px; }
.tile {
  background:linear-gradient(145deg,var(--card),var(--panel)); border:1px solid var(--line); border-radius:22px;
  padding:18px; min-height:112px; box-shadow:var(--shadow); text-decoration:none; color:var(--text);
}
.tile .ico { font-size:28px; }
.tile strong { display:block; margin-top:12px; font-size:20px; }
section.song {
  margin:24px 0 34px; background:var(--panel); border:1px solid var(--line); border-radius:28px; overflow:hidden; box-shadow:var(--shadow);
}
.banner {
  min-height:160px; display:grid; place-items:center; text-align:center; padding:24px;
  background:
    linear-gradient(135deg, rgba(123,95,164,.52), rgba(215,181,109,.18)),
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.22), transparent 20%),
    radial-gradient(circle at 72% 65%, rgba(255,255,255,.16), transparent 22%);
}
.banner h2 { font-family:Georgia,serif; font-size:clamp(34px,7vw,56px); margin:8px 0 0; color:#fff3d6; }
body.light .banner h2 { color:#fff8ea; text-shadow:0 1px 8px rgba(0,0,0,.28); }
.content { padding:22px clamp(18px,5vw,42px); }
.song-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.song-title { display:flex; align-items:center; gap:12px; font-family:Georgia,serif; font-size:32px; color:#fff3d6; margin:0 0 16px; }
body.light .song-title { color:#3b2718; }
.fav { font-size:22px; padding:8px 12px; }
.lyrics {
  white-space:pre-line; font-size:var(--font); line-height:1.72; letter-spacing:.01em;
}
.note {
  border-left:4px solid var(--gold); background:rgba(215,181,109,.1); padding:10px 12px; border-radius:12px; margin:12px 0;
}
.bottombar {
  position:fixed; bottom:0; left:0; right:0; z-index:60; display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:8px; padding:10px; background:rgba(18,19,28,.9); backdrop-filter:blur(12px); border-top:1px solid var(--line);
}
body.light .bottombar { background:rgba(255,250,242,.92); }
.hidden { display:none !important; }
mark { background:rgba(215,181,109,.45); color:inherit; border-radius:4px; padding:0 2px; }
@media (max-width:620px) {
  header { min-height:74vh; }
  .hero p { font-size:17px; }
  .toolbar { padding:8px; }
  .content { padding:18px; }
  .lyrics { font-size:var(--font); line-height:1.65; }
  .bottombar button { padding:12px 6px; border-radius:13px; }
}
</style>
</head>
<body>
<header id="inicio">
  <div class="hero">
    <div class="mark">📿</div>
    <h1>Hinário Digital da Gira</h1>
    <p>Organizado para acompanhar os pontos pelo celular, com busca rápida, letra ajustável e modo claro/escuro.</p>
    <div class="actions">
      <a class="btn primary" href="#hinario">Entrar no Hinário</a>
      <button id="installBtn" style="display:none">Instalar no celular</button>
    </div>
  </div>
</header>

<div class="toolbar" id="hinario">
  <div class="searchrow">
    <input id="search" placeholder="Buscar ponto ou trecho..." autocomplete="off">
    <button id="clear">Limpar</button>
  </div>
  <nav class="chips" id="chips"></nav>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div id="songs"></div>
</main>

<div class="bottombar">
  <button id="fontMinus">A−</button>
  <button id="fontPlus">A+</button>
  <button id="theme">Claro/Escuro</button>
</div>

<script>
const sections = [{"id": "abertura", "title": "Abertura", "sourceTitle": "Abertura", "icon": "🌿", "text": "Eu vou abrir minha jurema\nEu vou abrir meu jurema\nCom a licença de Mamãe Oxum\nE o nosso Pai Oxalá (2x)\nJá abri minha jurema\nJá abri meu jurema (2x)\nCom a licença de mamãe Oxum\nE o nosso Pai Oxalá (2x)\nAbrimos a nossa gira\nCom deus e Nossa Senhora\nAbrimos a nossa gira\nSamborê pemba de angola (2x)\nOxalá meu pai\nTem pena de nós, tenha dó\nSe a volta no mundo é grande\nSeus poderes são maiores (2x)"}, {"id": "sauda-o-esquerda", "title": "Saudação à Esquerda", "sourceTitle": "Saudação a esquerda", "icon": "🕯️", "text": "O sino da igrejinha faz belém-blém-blom (2x)\nDeu meia-noite, o galo já cantou\nSeu Tranca-rua que é dono da gira\nOi, corre, gira, que Ogum mandou (2x)\nVinha caminhando a pé,\nPara ver se encontrava\nPombo Gira cigana de fé. (2x)\nEla parou e leu minha mão.\nDisse - me toda verdade.\nEu só queria saber\nAonde andava Pomba Gira cigana de fé. (2x)\n(SÓ SE CANTA EM GIRA DE DIREITA)\nSai-te daqui Aluvaiá,\nQue aqui não é o seu lugar. (2x)\nEu não quero mais te ver,\nNa mesa dos Orixás\nEu não quero mais te ver,\nNa mesa de Oxalá  (SÓ SE CANTA EM GIRA DE DIREITA)"}, {"id": "hino-da-umbanda", "title": "Hino da Umbanda", "sourceTitle": "Hino da Umbanda", "icon": "🕊️", "text": "Refletiu a luz divina\nCom todo seu esplendor\nÉ no reino de Oxalá\nAonde há paz e amor\nLuz que refletiu na terra\nLuz que refletiu no mar\nLuz que veio de aruanda\nPara nos iluminar\nA umbanda é paz e amor\nÉ um mundo cheio de luz\nÉ força que nos dá vida\nE a grandeza nos conduz\nAvante, filhos de fé\nComo a nossa lei não há\nLevando ao mundo inteiro\nA bandeira de Oxalá\nLevando ao mundo inteiro\nA bandeira de Oxalá"}, {"id": "defuma-o", "title": "Defumação", "sourceTitle": "DEFUMAÇÃO", "icon": "🌫️", "text": "Nossa Senhora incensou a Jesus Cristo\nE Jesus Cristo incensou aos filhos seus\nEu incenso,  essa casa esse terreiro\nPara o mal sair o mal sair e o bem entrar(2x)\nCheirou, como cheira umbanda,\nUmbanda cheirou guiné… (2x)\nDefuma com Jesus, Maria e José…\nVamos defumar filhos de fé\nDefuma com Deus e Nossa senhora,\nAfastando os inimigos da porta pra fora (2x)\nCorre gira pai Ogum\nFilhos quer se defumar\nA umbanda tem fundamentos\nÉ preciso preparar\nCom incenso e benjoin\nAlecrim e alfazema\nDefumar filhos de fé\nCom as ervas da jurema\nCheirou, como cheira umbanda,\numbanda cheirou guiné…  (2x)\nDefuma com Jesus, Maria e José…\nVamos defumar filhos de fé\nDefuma com Deus e Nossa Senhora,\nA mata queimou cherou guiné\nVamos defumar filhos de fé (2x)\nDefuma com as ervas da jurema\nDefuma com arruda e guiné (2x)\nBejoim, alecrim e alfazema\nVamos defumar filhos de fé\nMeu pai Oxossi, da licença pra defumar (2x)\nEu defumo, eu defumo essa aldeia real.(x2)"}, {"id": "bater-cabe-a", "title": "Bater Cabeça", "sourceTitle": "BATER CABEÇA", "icon": "📿", "text": "Cachoeira da mata virgem;\nOnde mora meu pai Xangô. (2x)\nÁgua rolou, Nanã Buruquê;\nPedra rolou, saravá, pai Xangô. (2x)\nSaravá, pai Xangô ê-ê-ê, ê-ê-ia(2x)\nQuem é filho de fé bate a cabeça nesse  congá. (2x)\nBate a cabeça para o meu pai Xango,\nE la de aruanda ele me abençoou  (2x)\nMeu Pai Xangô é o chefe É o Rei da pedreira\nFilhos de fé na Umbanda vem abençoar\nCom sua luz e a sua missão justiceira\nFilhos de fé, saravá, Pai Xangô saravá\nSaravá\nSou filho de umbanda\nTo chegando agora\nSaravá Ogum Iemanjá minha senhora\nVou bater cabeça\nNo pé do conga\nVou pedir axé a Ogum e Oxalá\nBate cabeça filho de umbanda\nAo nosso Pai Oxalá\nBenção Papai\nBenção Mamãe\nFilho de umbanda tem coroa de Oxalá\nCom a mão direita ele pede a benção\nCom a mão na pemba vai saudar seus Orixás\nSe ele é filho de umbanda\nFaz seu saravá\nBate cabeça saudando esse conga\nOferece a prece pra Deus lhe ajudar\nGloria nas alturas faz nesse conga (2x)\nOi salve a Pemba, também salve a toalha (2x)\nSalve a coroa é de nosso Zambi é o maior (2x)\nVai, vai, vai, aos pés de nosso Senhor\nVai bater cabeça Oxalá mandou."}, {"id": "ogum", "title": "Ogum", "sourceTitle": "OGUM", "icon": "⚔️", "text": "Nesta casa de guerreiro (Ogum)\nVim de longe pra rezar (Ogum)\nPeço à deus pelos doentes (Ogum)\nCom fé em obatalá (Ogum)\nOgum salve a casa santa (Ogum)\nOs presentes e os ausentes (Ogum)\nSalve nossas esperanças (Ogum)\nSalve velhos e crianças (Ogum)\nPreto velho ensinou (Ogum)\nNa cartilha de aruanda ê (Ogum)\nE pai ogum não esqueceu (ogum)\nComo vencer a demanda (Ogum)\nOgum, meu pai\nOgunhê (Ogum)\nOgum, meu pai\nA tristeza vai embora (Ogum)\nVai na espada de um guerreiro (Ogum)\nE a luz do romper da aurora (Ogum)\nVai brilhar neste terreiro (Ogum)\nA tristeza foi embora (Ogum)\nFoi na espada de um guerreiro (Ogum)\nE a luz do romper da aurora (Ogum)\nJá brilhou neste terreiro (Ogum)\nOgum, meu pai\nOgunhê (Ogum)\nOgum, meu pai\nOgunhê\nEu tenho Sete Espadas pra me defender\nEu tenho Ogum em minha companhia (2X)\nOgum é meu pai\nOgum é meu guia\nOgum é meu pai\nNa fé de zambi\nE da virgem maria (2x)"}, {"id": "oxum", "title": "Oxum", "sourceTitle": "OXUM", "icon": "💛", "text": "Eu vi mamãe Oxum na cachoeira\nSentada na beira do rio\nEu vi mamãe Oxum na cachoeira\nSentada na beira do rio\nColhendo lírio, lírio ê\nColhendo lírio, lírio á\nColhendo lírio\nPra enfeitar nosso congá (2x)\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum!\nOra aieiê, ô!\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum\nBeleza pura, linda e cristalina\nEssa deusa menina com perfume da flor\nEncanto doce da natureza\nMe inspira beleza, vaidade e amor\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum\nOra aieiê, ô!\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum!\nQuando se banha na beira do rio\nO sol irradia energia e calor\nDona do ouro, deusa poderosa\nPedra preciosa cheia de esplendor\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum!\nOra aieiê, ô!\nNuvem de poeira d'água\nQue sai da cascata da deusa Oxum!"}, {"id": "ox-ssi", "title": "Oxóssi", "sourceTitle": "OXOSSI", "icon": "🏹", "text": "Sou filho do guerreiro de uma flecha só\nSou filho de Oxossi caçador\nE todo bom guerreiro não anda só\nTem sempre um irmão merecedor\nO rei das matas\nO meu protetor\nO rei das matas\nO meu protetor\nSarava meu pai Oxossi\nSua bênção meu senhor\nOke arô\nEu vi a lua, eu vi\nEu vi a lua, eu vi\nEu vi a lua eu falei com ela\nA lua é linda\nA lua é bela\nSenhor Oxossi  mora dentro dela"}, {"id": "iemanj", "title": "Iemanjá", "sourceTitle": "IEMANJÁ", "icon": "🌊", "text": "Hoje\nHoje eu vou cantar\nHoje eu vou cantar\nVou louvar na areia\nEm lua cheia a mãe Iemanjá\nIê, iê!\nRosa do mar\nMinha estrela do céu azul\nNão é história do pescador\nQue meu amor eu vou lhe entregar\nIê, iê!\nDeixa\nDeixa as ondas do mar passar\nOuça o canto da bela odoiá\nOxalá quem mandou\nUm grande amor\nDo fundo do mar\nIê, iê!\nHuuuumm\nÔ, ô, ô, ô, ô, ô\nÔ, ô, ô, ô, ô, ô\nOh, mãe iemanjá!\nIê, iê!"}, {"id": "xang", "title": "Xangô", "sourceTitle": "XANGÔ", "icon": "⚖️", "text": "Ele bradou na aldeia\nBradou na cachoeira\nEm noite de luar\nNo alto da pedreira\nVai fazer justiça\nPra nos ajudar\nEle bradou na aldeia\nEle bradou na aldeia\nBradou na cachoeira\nEm noite de luar\nNo alto da pedreira\nVai fazer justiça\nPra nos ajudar\nEle bradou na aldeia\nKaô, kaô!\nE aqui vai bradar\nKaô, kaô!\nEle é Xangô da pedreira\nEle na nasceu na cachoeira\nLá no juremá!\nEstão queimando velas\nPara me derrubar\nEu já fiquei doente, meu pai\nSem poder andar\nMas hoje estou aqui\nQue é pra saudar Xangô\nE vira essa macumba\nNo peito de quem mandou\nXangô, meu pai\nAmarra os inimigo e dá um nó\nXangô, meu pai\nAmarra na pontinha do cipó (2x)"}, {"id": "ians", "title": "Iansã", "sourceTitle": "IANSÃ", "icon": "🌪️", "text": "Olha que o céu clareou\nQuando o dia raiou\nFez o filho pensar\nA mãe do tempo mandou\nA nova era chegou\nAgora vamos plantar\nDo humaitá Ogum brandou\nSenhor Oxossi atinou\nIansã vai chegar\nO ogã já firmou\nAtabaque afinou\nAgora vamos cantar\nA eparrei ela é oyá, ela é oyá\nA eparrei é Iansã, é Iansã\nA eparrei\nQuando Iansã vai pra batalha\nTodos os cavaleiros param\nSó pra ver ela passar\nÔ Iansã menina seu jeito me fascina\nÉ de arrepiar\nÔ Iansã guerreira não há barreiras\nPra lhe segurar\nEla chegou ! Bem devagar\nE observou em cada canto desse mundo\nE a fez pensar\nA luz brilhou em seu jacutá\nE anunciou\nPrepare que a guerreira agora vai reinar\nÔ Iansã menina seu jeito me fascina\nÉ de arrepiar\nÔ Iansã guerreira não há barreiras\nPra lhe segurar\nO tempo mudou ! Fez o céu brilhar\nO sol e a lua irradiam energia\nPara renovar\nQue renasça o amor e fortaleça a fé\nPois Iansã esta soprando pelo mundo\nUm vendaval de axé !\nÔ Iansã menina seu jeito me fascina\nÉ de arrepiar\nÔ Iansã guerreira não há barreiras\nPra lhe segurar"}, {"id": "obalua", "title": "Obaluaê", "sourceTitle": "OBALUAÊ", "icon": "🕯️", "text": "É Obaluaê\nÉ Obaluaê\nÉ atotô\nÉ Obaluaê\nÉ Obaluaê\nSe você está sofrendo\nNo leito ou com frio e com dor\nCom pipoca e com dendê\nMuita gente ele curou\nSe seu corpo está ferido\nE não pode mais suportar\nPeça proteção á ele\nQue ele vai lhe ajudar!\nObaluaê!!!\nNa pedra fria, no pé do morro\nDizem que mora um velho lá\nNa pedra fria, no pé do morro\nDizem que mora um velho lá\nEle é curador, ele é rezador\nEle é xapanã, ele vai lhe curar\nEle é curador, ele é rezador\nEle é Xapanã, ele vai lhe curar"}, {"id": "nan", "title": "Nanã", "sourceTitle": "NANÃ", "icon": "✨", "text": "Quando eu olhei pro céu\nPedi a Oxalá\nQue me desse as estrelas\nPara iluminar\nQuando avistei um anjo\nQue veio me dizer\nSou de Nanã êua, êua, êua ê\nSou de Nanã êua, êua, êua ê\nSou de Nanã êua, êua, êua ê\nSou de Nanã êua, êua, êua ê"}, {"id": "preto-velho", "title": "Preto Velho", "sourceTitle": "PRETO VELHO", "icon": "🤍", "text": "O rosário de vó Joana, bate devagar, mas pode doer.\nO rosário de vó Joana, tem mironga pra benzer.\nTem dendê, o meu zí fio, oô tem dendê…\nTem dendê, o meu zí fio, oô tem dendê.\nO rosário devó Joana, tem mironga pra benzer!"}, {"id": "er", "title": "Erê", "sourceTitle": "ERÊ", "icon": "🍬", "text": "Doum, doum, doum alegria da criançada\nDoum, doum, doum, é festa da ibejada (2x)\nTem criança brincando com doce na mão\nÉ riso, é festa de cosme e damião (2x)"}, {"id": "ciganos", "title": "Ciganos", "sourceTitle": "CIGANOS", "icon": "🧿", "text": "Vem\nVem caminhar\nCom os ciganos da terra\nCom os ciganos do mar\nVem caminhar\nCom os ciganos da terra\nCom os ciganos do mar\nSanta sara kali\nAbençoe esta terra\nCom alegria e amor\nProsperidade e fé\nBate palma cigano\nBote o pé na estrada\nCom o olhar adelante\nAlegra a caminhada\nSalve o sol e a lua\nA salve a fé na família\nSalve a estrela cigana\nCom sua força e harmonia"}, {"id": "z-pilintra", "title": "Zé Pilintra", "sourceTitle": "ZÉ PILINTRA", "icon": "🎩", "text": "Eu chorei por nao ter pai\nDeus me deu um protetor\nGuardião dos meus caminhos Zé Pilintra me criou\nMe ensinou que o malandro é diferente do esperto\nNem tudo que brilha é ouro e nem todo caminho é certo\nNem na hora do aperto ele me deixou desistir\nSaravá seu Zé Pilintra nunca me deixou cair\nPode me faltar dinheiro\nPode me faltar o amor\nMas se faltar seu Zé Pilintra minha vida acabou (2x)"}, {"id": "oxal", "title": "Oxalá", "sourceTitle": "OXALÁ", "icon": "🕊️", "text": "Oxalá nas oliveiras\nPediu ao Senhor do mundo\nOxalá nas oliveiras\nPediu ao senhor do mundo\nQue plantasse\nQue semeasse\nA caridade que o pai determinou\nQue plantasse\nQue semeasse\nA caridade que o Pai determinou\nComo é lindo, Oxalá!\nComo é lindo, Oxalá!\nComo é lindo, Oxalá em seu gongá\nComo é lindo, Oxalá!\nComo é lindo, Oxalá!\nComo é lindo, Oxalá em seu gongá"}, {"id": "7-linhas-da-umbanda", "title": "7 Linhas da Umbanda", "sourceTitle": "7 LINHAS DA UMBANDA", "icon": "🌈", "text": "Oi, salve a umbanda\nVamos saudar as sete linhas dos orixás\nNa natureza, sete são as vibrações\nQue Pai Olorum criou e aqui estão neste congá\nNa linha da sagrada geração\nPai Omulu e também Iemanjá\nLá na floresta, a força do conhecimento\nSaravá, meu Pai Oxóssi, saravá pra Mãe Obá\nQuem movimenta é Iansã\nPelos caminhos do Pai Ogum\nLinha da lei é linha forte nas demandas\nSaravá pra lei da umbanda, saravá pra lei maior\nNa força de Xangô e Oroiná\nTem a justiça que vem tudo equilibrar\nNa evolução, quem rege é Obaluaê\nQue traz todo o seu saber junto com a Mãe Nanã\nA cachoeira é de Oxum\nE o arco-íris de Oxumaré\nQue são as linhas do amor de Pai Olorum\nQue ilumina cada um e engrandece a nossa fé\nSalve a umbanda, salve as sete vibrações\nSão sete cores na coroa de babá\nMãe Logunã é a mãe do tempo e mãe da fé\nE o regente da umbanda é o nosso Pai Oxalá (2x)"}];
const chips = document.getElementById('chips');
const grid = document.getElementById('grid');
const songs = document.getElementById('songs');
const search = document.getElementById('search');
const clear = document.getElementById('clear');
let fontSize = Number(localStorage.getItem('fontSize') || 20);
document.documentElement.style.setProperty('--font', fontSize + 'px');

function slug(s) { return s.id; }
function esc(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function highlight(text, q) {
  let safe = esc(text);
  if (!q) return safe;
  const rx = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')','gi');
  return safe.replace(rx, '<mark>$1</mark>');
}
function render(q='') {
  const query = q.trim().toLowerCase();
  chips.innerHTML = sections.map(s => `<a class="chip" href="#${s.id}">${s.icon} ${s.title}</a>`).join('');
  grid.innerHTML = sections.map(s => `<a class="tile" href="#${s.id}"><div class="ico">${s.icon}</div><strong>${s.title}</strong><small>${s.text.split('\n').filter(Boolean).length} linhas</small></a>`).join('');
  songs.innerHTML = sections.map(s => {
    const hay = (s.title + ' ' + s.text).toLowerCase();
    const match = !query || hay.includes(query);
    return `<section class="song ${match ? '' : 'hidden'}" id="${s.id}">
      <div class="banner"><div><div style="font-size:42px">${s.icon}</div><h2>${s.title}</h2><small>Hinário Digital da Gira</small></div></div>
      <div class="content">
        <div class="song-head">
          <h3 class="song-title"><span>${s.icon}</span> ${s.title}</h3>
          <button class="fav" data-id="${s.id}" title="Favoritar">☆</button>
        </div>
        <div class="lyrics">${highlight(s.text, query)}</div>
        <p><a class="chip" href="#hinario">↑ Menu</a></p>
      </div>
    </section>`;
  }).join('');
  refreshFavs();
}
function refreshFavs() {
  const favs = JSON.parse(localStorage.getItem('favs') || '[]');
  document.querySelectorAll('.fav').forEach(btn => {
    btn.textContent = favs.includes(btn.dataset.id) ? '★' : '☆';
    btn.onclick = () => {
      let f = JSON.parse(localStorage.getItem('favs') || '[]');
      f = f.includes(btn.dataset.id) ? f.filter(x=>x!==btn.dataset.id) : [...f, btn.dataset.id];
      localStorage.setItem('favs', JSON.stringify(f));
      refreshFavs();
    };
  });
}
search.addEventListener('input', e => render(e.target.value));
clear.addEventListener('click', () => { search.value=''; render(''); });
document.getElementById('fontPlus').onclick = () => { fontSize=Math.min(34,fontSize+2); localStorage.setItem('fontSize',fontSize); document.documentElement.style.setProperty('--font',fontSize+'px'); };
document.getElementById('fontMinus').onclick = () => { fontSize=Math.max(16,fontSize-2); localStorage.setItem('fontSize',fontSize); document.documentElement.style.setProperty('--font',fontSize+'px'); };
document.getElementById('theme').onclick = () => { document.body.classList.toggle('light'); localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark'); };
if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
render();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const btn = document.getElementById('installBtn'); btn.style.display='inline-block';
  btn.onclick = () => { deferredPrompt.prompt(); };
});
</script>
</body>
</html>
